name: Update live results

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch results from ESPN
        run: node scripts/fetch-results.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- public/results.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/results.json
            git commit -m "chore: update live results"
            git push
            echo "Results updated."
          else
            echo "No result changes."
          fi
