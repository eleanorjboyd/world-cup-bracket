<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B · Focus stepper — WC2026 Bracket</title>
    <style>
      :root {
        --bg: #0b1020; --bg-soft: #151c33; --card: #1b2440;
        --line: #2c3866; --text: #e8ecf8; --muted: #94a0c4;
        --accent: #00d68f; --accent-soft: rgba(0, 214, 143, 0.16); --gold: #ffd24a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1100px 560px at 50% -10%, #1a2548 0%, var(--bg) 55%);
        color: var(--text);
        display: flex; flex-direction: column; align-items: center;
        padding: 0 16px 120px;
      }
      .top {
        width: 100%; max-width: 760px; display: flex; align-items: center; gap: 14px;
        padding: 14px 4px; color: var(--muted);
      }
      .top a { color: var(--muted); text-decoration: none; font-size: 13px; }
      .top a:hover { color: var(--text); }
      .top h1 { font-size: 15px; margin: 0; color: var(--text); }
      .top .spacer { flex: 1; }
      .reset { background: transparent; color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; cursor: pointer; }

      .head { text-align: center; margin: 14px 0 6px; }
      .head .round { font-size: 28px; font-weight: 800; }
      .head .desc { color: var(--muted); font-size: 14px; margin-top: 4px; }

      .dots { display: flex; gap: 8px; justify-content: center; margin: 14px 0 22px; }
      .dot {
        display: flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 999px;
        border: 1px solid var(--line); font-size: 12px; color: var(--muted); cursor: pointer; background: transparent;
      }
      .dot.active { border-color: var(--accent); color: var(--text); background: var(--accent-soft); }
      .dot.done { color: var(--text); }
      .dot b { font-weight: 700; }

      .matches {
        width: 100%; max-width: 760px;
        display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 14px;
      }
      .mcard { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
      .mcard .meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
      .vs { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
      .vs .mid { color: var(--muted); font-size: 12px; }
      .opt {
        display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 8px;
        border-radius: 12px; border: 2px solid transparent; background: var(--bg-soft);
        cursor: pointer; color: var(--text); transition: transform 0.06s, border-color 0.12s, background 0.12s;
      }
      .opt:hover:not(:disabled) { background: #1f2b4d; }
      .opt:active:not(:disabled) { transform: scale(0.98); }
      .opt.sel { border-color: var(--accent); background: var(--accent-soft); }
      .opt:disabled { cursor: default; opacity: 0.55; }
      .opt .fl { font-size: 34px; line-height: 1; }
      .opt .nm { font-size: 14px; font-weight: 600; text-align: center; }
      .opt.sel .nm::after { content: ' ✓'; color: var(--accent); }
      .opt .ph { color: var(--muted); font-style: italic; font-weight: 500; }

      .champ-wrap { text-align: center; padding: 30px 10px; }
      .champ-wrap .trophy { font-size: 60px; }
      .champ-wrap .fl { font-size: 64px; display: block; margin: 6px 0; }
      .champ-wrap .nm { font-size: 30px; font-weight: 800; }
      .champ-wrap .tag { color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; margin-top: 6px; }

      .nav {
        position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 12px;
        padding: 16px; background: linear-gradient(transparent, var(--bg) 40%);
      }
      .nav button {
        min-width: 140px; padding: 14px 22px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
        border: 1px solid var(--line); background: var(--card); color: var(--text);
      }
      .nav button.primary { background: var(--accent); color: #04231a; border-color: var(--accent); }
      .nav button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="top">
      <a href="index.html">← mockups</a>
      <h1>B · Focus stepper</h1>
      <span class="spacer"></span>
      <button class="reset" id="reset">Reset</button>
    </div>

    <div class="head">
      <div class="round" id="roundName"></div>
      <div class="desc" id="roundDesc"></div>
    </div>
    <div class="dots" id="dots"></div>
    <div id="body"></div>
    <div class="nav">
      <button id="back">← Back</button>
      <button id="next" class="primary">Next →</button>
    </div>

    <script src="engine.js"></script>
    <script>
      const store = createStore('wc2026-mock-B');
      let step = firstIncompleteRound();

      function firstIncompleteRound() {
        for (let i = 0; i < ROUND_IDS.length; i++) {
          const ms = inBracketOrder(ROUND_IDS[i]);
          if (ms.some((m) => store.winner(m.id) == null)) return i;
        }
        return ROUND_IDS.length - 1;
      }

      function roundComplete(roundId) {
        return inBracketOrder(roundId).every((m) => store.winner(m.id) != null);
      }

      function optHtml(matchId, code, placeholder) {
        const sel = store.winner(matchId) === code && code;
        if (!code) return `<button class="opt" disabled><span class="fl">⚽️</span><span class="nm ph">${placeholder}</span></button>`;
        return `<button class="opt ${sel ? 'sel' : ''}" data-m="${matchId}" data-t="${code}">
          <span class="fl">${flag(code)}</span><span class="nm">${name(code)}</span></button>`;
      }

      function render() {
        const roundId = ROUND_IDS[step];
        document.getElementById('roundName').textContent = ROUND_LABEL[roundId];
        const ms = inBracketOrder(roundId);
        const done = ms.filter((m) => store.winner(m.id) != null).length;
        document.getElementById('roundDesc').textContent =
          roundId === 'F' ? 'Pick your champion' : `Pick the winners — ${done}/${ms.length} done`;

        // dots
        document.getElementById('dots').innerHTML = ROUND_IDS.map((r, i) => {
          const cls = i === step ? 'active' : roundComplete(r) ? 'done' : '';
          const tick = roundComplete(r) ? '✓' : '';
          return `<button class="dot ${cls}" data-i="${i}"><b>${ROUND_LABEL[r]}</b> ${tick}</button>`;
        }).join('');

        // body
        const body = document.getElementById('body');
        const champ = store.champion();
        if (roundId === 'F' && champ) {
          body.innerHTML = `<div class="champ-wrap">
            <div class="trophy">🏆</div>
            <span class="fl">${flag(champ)}</span>
            <div class="nm">${name(champ)}</div>
            <div class="tag">your champion</div>
          </div>`;
        } else {
          body.className = '';
          body.innerHTML = `<div class="matches">` + ms.map((m) => {
            const [a, b] = store.teamsOf(m);
            const pa = m.a.win ? 'Winner ' + m.a.win : 'TBD';
            const pb = m.b.win ? 'Winner ' + m.b.win : 'TBD';
            return `<div class="mcard">
              <div class="meta"><span>Match ${m.id}</span><span>${m.d}</span></div>
              <div class="vs">${optHtml(m.id, a, pa)}<span class="mid">vs</span>${optHtml(m.id, b, pb)}</div>
            </div>`;
          }).join('') + `</div>`;
        }

        document.getElementById('back').disabled = step === 0;
        const next = document.getElementById('next');
        next.disabled = !roundComplete(roundId);
        next.textContent = step === ROUND_IDS.length - 1 ? 'Done' : 'Next →';

        bind();
      }

      function bind() {
        document.querySelectorAll('.opt[data-m]').forEach((el) =>
          el.addEventListener('click', () => { store.pick(+el.dataset.m, el.dataset.t); render(); }));
        document.querySelectorAll('.dot').forEach((el) =>
          el.addEventListener('click', () => { step = +el.dataset.i; render(); }));
      }

      document.getElementById('next').addEventListener('click', () => {
        if (step < ROUND_IDS.length - 1) { step++; render(); }
      });
      document.getElementById('back').addEventListener('click', () => {
        if (step > 0) { step--; render(); }
      });
      document.getElementById('reset').addEventListener('click', () => { store.reset(); step = 0; render(); });
      render();
    </script>
  </body>
</html>
